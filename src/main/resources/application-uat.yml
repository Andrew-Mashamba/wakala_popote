# UAT profile - wakala_popote on zima-uat.site:8098
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:quickcash}
    username: ${DB_USERNAME:quickcash}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  h2:
    console:
      enabled: false

server:
  port: ${SERVER_PORT:8098}

app:
  jwt:
    secret: ${JWT_SECRET:wakala-popote-uat-dev-secret-32bytes!!}

logging:
  level:
    root: INFO
    com.quickcash: DEBUG
    org.hibernate.SQL: INFO
